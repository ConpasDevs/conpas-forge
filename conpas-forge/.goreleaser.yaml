version: 2
project_name: conpas-forge

before:
  hooks:
    - go mod tidy

builds:
  - id: conpas-forge
    main: ./main.go
    binary: conpas-forge
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/conpasDEVS/conpas-forge/internal/version.Version={{.Version}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: conpasDEVS
    name: conpas-forge
